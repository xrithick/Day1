<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — SmartAttend</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">📘 SmartAttend</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="features.html">Features</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Attendance Dashboard</h1>
    <p>Mark today's attendance — or any date — with a single tap.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="dash-toolbar">
      <div>
        <label class="tb-label">Date</label>
        <input type="date" id="dateInput"/>
      </div>
      <div>
        <label class="tb-label">Search</label>
        <input type="text" id="searchInput" placeholder="Search by name or roll no…"/>
      </div>
      <div class="tb-actions">
        <button class="btn btn-outline" id="markAllPresent">Mark All Present</button>
        <button class="btn btn-outline" id="exportCsv">Export CSV</button>
        <a href="register.html" class="btn btn-primary">+ Add Student</a>
      </div>
    </div>

    <div id="statsBar" class="stats-bar"></div>

    <div id="studentList" class="student-list"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <h3>No students yet</h3>
      <p>Register your first student to start tracking attendance.</p>
      <a href="register.html" class="btn btn-primary">Get Started</a>
    </div>
  </div>
</section>

<footer class="footer"><div class="container"><p>© 2026 SmartAttend</p></div></footer>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
