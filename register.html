<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register Student — SmartAttend</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">📘 SmartAttend</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="features.html">Features</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Register a New Student</h1>
    <p>Answer 7 quick questions to add a student to your attendance roster.</p>
  </div>
</section>

<section class="section">
  <div class="container narrow">
    <form id="registerForm" class="form-card">

      <div class="field">
        <label>1. Full Name <span>*</span></label>
        <input type="text" name="fullName" required placeholder="e.g. Aarav Sharma"/>
      </div>

      <div class="field">
        <label>2. Roll Number / Student ID <span>*</span></label>
        <input type="text" name="rollNo" required placeholder="e.g. 2026-CS-014"/>
      </div>

      <div class="field">
        <label>3. Class / Grade / Course <span>*</span></label>
        <input type="text" name="className" required placeholder="e.g. Class 10-A or B.Sc CS Year 2"/>
      </div>

      <div class="field">
        <label>4. Date of Birth <span>*</span></label>
        <input type="date" name="dob" required/>
      </div>

      <div class="field">
        <label>5. Gender <span>*</span></label>
        <select name="gender" required>
          <option value="">Select…</option>
          <option>Male</option><option>Female</option><option>Other</option>
        </select>
      </div>

      <div class="field">
        <label>6. Email or Phone Number <span>*</span></label>
        <input type="text" name="contact" required placeholder="e.g. aarav@email.com or 9876543210"/>
      </div>

      <div class="field">
        <label>7. Parent / Guardian Name & Contact <span>*</span></label>
        <input type="text" name="guardian" required placeholder="e.g. Ravi Sharma — 9123456789"/>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Register Student</button>
      <p id="formMsg" class="form-msg"></p>
    </form>
  </div>
</section>

<footer class="footer"><div class="container"><p>© 2026 SmartAttend</p></div></footer>

<script src="js/app.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(this).entries());
  data.id = Date.now().toString();
  data.attendance = {}; // { '2026-05-11': 'present'|'absent' }
  const list = JSON.parse(localStorage.getItem('students') || '[]');
  list.push(data);
  localStorage.setItem('students', JSON.stringify(list));
  document.getElementById('formMsg').textContent = '✅ Student registered! Redirecting to dashboard...';
  setTimeout(()=> window.location.href='dashboard.html', 1200);
});
</script>
</body>
</html>
